services:
  redis:
    image: redis:7-alpine
    container_name: auth_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backup:
    image: postgres:15-alpine
    container_name: auth_backup
    restart: "no"
    depends_on:
      postgres_db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_USER: postgres
      DB_NAME: auth_db
      PGPASSWORD: postgres
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache bash > /dev/null 2>&1 && /scripts/backup.sh"]

  app:
    build: .
    container_name: auth_app
    ports:
      - "8080:8080"
    depends_on:
      - postgres_db
      - redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres_db:5432/auth_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - APP_JWTSECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - APP_JWTEXPIRATIONMS=86400000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PAYROLL_CACHE_ENABLED=true

  postgres_db:
    image: postgres:15-alpine
    container_name: auth_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
